<meta charset="UTF-8">

<title>Pricewire — lowest true cost for any laptop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&family=Outfit:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
:root {
  --bg:#0D0D0B; --card:#161613; --line:#292924; --ink:#F1F1EA;
  --muted:#97978C; --green:#D9FF3D; --green-ink:#141600; --up:#FF8A4C;
}
* { box-sizing:border-box; margin:0; }
body { min-height:100vh; background:var(--bg); color:var(--ink); font-family:'Outfit',system-ui,sans-serif; }
.nav { display:flex; align-items:center; justify-content:space-between; padding:18px 22px; border-bottom:1px solid var(--line); }
.logo { display:flex; align-items:center; gap:11px; }
.logomark { width:34px; height:26px; border:2px solid var(--green); border-radius:7px; position:relative; }
.logomark::after { content:''; position:absolute; left:6px; right:6px; top:50%; height:2px; background:var(--green);
  clip-path:polygon(0 0,30% 0,45% 100%,60% 0,100% 0,100% 100%,0 100%); }
.logoname { font-family:'Fraunces',serif; font-size:24px; font-weight:500; letter-spacing:-0.01em; }
.updated { font:500 12px/1.4 'IBM Plex Mono',monospace; color:var(--muted); text-align:right; }
.updated b { color:var(--green); font-weight:500; display:block; }
.navright { display:flex; align-items:center; gap:16px; flex-wrap:wrap; justify-content:flex-end; }
.regiontoggle { display:flex; border:1px solid var(--line); border-radius:999px; overflow:hidden; }
.rbtn { border:0; background:transparent; color:var(--muted); cursor:pointer;
  font:500 13px 'Outfit',sans-serif; padding:9px 14px; transition:all .15s; }
.rbtn:hover { color:var(--ink); }
.rbtn.active { background:var(--green); color:var(--green-ink); font-weight:600; }
.rbtn:focus-visible { outline:2px solid var(--green); outline-offset:2px; }
@media (max-width:620px) { .nav { flex-direction:column; align-items:flex-start; gap:12px; } .navright { justify-content:flex-start; } }
.ticker { border-bottom:1px solid var(--line); overflow:hidden; font:500 14px/1 'IBM Plex Mono',monospace; color:var(--muted); padding:14px 0; white-space:nowrap; }
.ticker-track { display:inline-flex; gap:42px; animation:roll 40s linear infinite; padding-left:22px; }
@keyframes roll { to { transform:translateX(-50%); } }
@media (prefers-reduced-motion:reduce) { .ticker-track { animation:none; } }
.tick { display:inline-flex; gap:8px; align-items:center; }
.dot { width:7px; height:7px; border-radius:50%; background:var(--green); }
.tick .p { color:var(--green); }
.hero { max-width:720px; margin:0 auto; padding:56px 22px 40px; }
.live { display:flex; align-items:center; gap:10px; font:500 14px/1 'IBM Plex Mono',monospace; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin-bottom:26px; }
.pulse { width:12px; height:12px; border-radius:50%; background:var(--green); box-shadow:0 0 0 3px rgba(217,255,61,.18); animation:pulse 2s ease-in-out infinite; }
@keyframes pulse { 50% { box-shadow:0 0 0 7px rgba(217,255,61,.07); } }
@media (prefers-reduced-motion:reduce) { .pulse { animation:none; } }
h1 { font-family:'Fraunces',serif; font-weight:450; font-size:clamp(38px,7.5vw,62px); line-height:1.06; letter-spacing:-0.015em; margin-bottom:24px; }
h1 em { font-style:italic; color:var(--green); }
.sub { font-size:clamp(17px,3vw,21px); font-weight:300; line-height:1.5; color:var(--muted); margin-bottom:34px; }
.sub b { color:var(--ink); font-weight:500; }
.searchbar { display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--line); border-radius:18px; padding:9px 9px 9px 18px; }
.searchbar:focus-within { border-color:var(--green); }
.searchbar svg { flex:none; opacity:.55; }
.searchbar input { flex:1; min-width:0; border:0; outline:none; background:transparent; color:var(--ink); font:400 17px 'Outfit',sans-serif; padding:12px 0; }
.searchbar input::placeholder { color:#6B6B62; }
.go { border:0; cursor:pointer; background:var(--green); color:var(--green-ink); font:600 15px/1.25 'Outfit',sans-serif; border-radius:14px; padding:14px 22px; transition:transform .12s,filter .12s; }
.go:hover { filter:brightness(1.06); } .go:active { transform:scale(.97); }
.go:focus-visible,.chip:focus-visible,.buy:focus-visible { outline:2px solid var(--green); outline-offset:2px; }
.chips { display:flex; flex-wrap:wrap; gap:10px; margin-top:18px; }
.chip { border:1px solid var(--line); background:transparent; color:var(--muted); border-radius:999px; padding:10px 16px; font:400 14px 'Outfit',sans-serif; cursor:pointer; transition:all .15s; }
.chip:hover { border-color:var(--green); color:var(--green); }
.results { max-width:720px; margin:0 auto; padding:8px 22px 90px; display:none; }
.rhead h2 { font-family:'Fraunces',serif; font-weight:500; font-size:28px; letter-spacing:-0.01em; }
.rhead p { color:var(--muted); font-size:15px; margin-top:6px; }
.why { margin:18px 0 10px; border:1px solid rgba(217,255,61,.3); background:rgba(217,255,61,.06); border-radius:12px; padding:14px 16px; font-size:15px; line-height:1.5; }
.why b { color:var(--green); font-weight:500; }
.modeflag { color:var(--green); font-size:13px; font-family:'IBM Plex Mono',monospace; margin:0 0 18px; line-height:1.5; }
.modeflag.warn { color:var(--up); }
.retailer { position:relative; display:grid; grid-template-columns:1fr auto; gap:4px 16px; background:var(--card); border:1px solid var(--line); border-radius:16px; padding:20px; margin-bottom:12px; }
.retailer.best { border-color:var(--green); box-shadow:0 0 34px -14px rgba(217,255,61,.45); }
.tag { position:absolute; top:-12px; left:16px; background:var(--green); color:var(--green-ink); font:600 11px/1 'IBM Plex Mono',monospace; letter-spacing:.09em; padding:6px 10px; border-radius:6px; }
.rname { font-weight:500; font-size:17px; }
.rmeta { grid-column:1; color:var(--muted); font-size:14px; line-height:1.5; }
.price { grid-row:1/span 2; grid-column:2; align-self:center; text-align:right; font:600 24px/1 'IBM Plex Mono',monospace; letter-spacing:-0.02em; }
.retailer.best .price { color:var(--green); font-size:29px; }
.buy { grid-column:1/-1; justify-self:start; margin-top:12px; text-decoration:none; font:500 14px/1 'Outfit',sans-serif; color:var(--ink); border:1px solid var(--line); border-radius:999px; padding:11px 18px; transition:all .15s; }
.buy:hover { border-color:var(--green); color:var(--green); }
.retailer.best .buy { background:var(--green); border-color:var(--green); color:var(--green-ink); font-weight:600; }
.foot { margin-top:24px; font-size:13px; color:var(--muted); }
</style>

     "url": "https://www.newegg.com/p/pl?d=Lenovo%20Legion%20Slim%205%20Gen%2010"
    }
   ],
   "bestIndex": 0,
   "verified": false
  }
 ]
}
</script>
<!-- ================== END PRICE DATA ================== -->

<nav class="nav">
  <div class="logo"><div class="logomark" aria-hidden="true"></div><span class="logoname">Pricewire</span></div>
  <div class="navright">
    <div class="regiontoggle" role="group" aria-label="Choose your country">
      <button class="rbtn active" id="btn-us">🇺🇸 USA</button>
      <button class="rbtn" id="btn-za" style="display:none">🇿🇦 South Africa</button> 
    </div>
    <div class="updated">prices verified<b id="asof"></b></div>
  </div>
</nav>

<div class="ticker" aria-hidden="true"><div class="ticker-track" id="ticker"></div></div>

<main class="hero">
  <div class="live"><span class="pulse"></span>Updated every 2 weeks by your Claude bot</div>
  <h1>Find the <em>lowest true cost</em> for any laptop, anywhere.</h1>
  <p class="sub">Name a machine and we'll rank where to buy it, so you know exactly where to click <b>buy</b>.<br><span id="sub-note" style="font-size:15px;color:var(--muted);">Prices re-verified every 2 weeks across Amazon, Best Buy, B&amp;H, Newegg, Costco and more.</span></p>
  <div class="searchbar">
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
    <input id="q" placeholder="Name a laptop — e.g. MacBook Air M4" aria-label="Laptop model">
    <button class="go" id="goBtn">Trace price</button>
<button class="chip" id="resetBtn" style="margin-left:8px;">Reset</button>

  </div>
  <div class="chips" id="chips"></div>
</main>

<section class="results" id="results"></section>

<script>
const DATA = JSON.parse(document.getElementById('price-data').textContent);
document.getElementById('asof').textContent = DATA.asOf;

// ticker from live data (cap at 16 for smooth scrolling with a big catalog)
const tickerItems = DATA.laptops.slice(0, 16).map(l => {
  const best = l.retailers[l.bestIndex || 0];
  return `<span class="tick"><span class="dot"></span>${l.name.replace(/"/g,'&quot;')}  <span class="p">${best.price}</span> at ${best.name}</span>`;
});
document.getElementById('ticker').innerHTML = [...tickerItems, ...tickerItems].join('');

// example chips — a varied spread across categories, shuffled slightly each load
const spread = ['MacBook Air 13" (M4)', 'ThinkPad X1 Carbon Gen 13 Aura', 'ASUS ROG Zephyrus G14',
  'Acer Chromebook Plus 514', 'Dell XPS 13 (now Dell 14 Premium)', 'Lenovo Legion 5'];
const chips = document.getElementById('chips');
spread.slice(0, 4).forEach(name => {
  const l = DATA.laptops.find(x => x.name === name);
  if (!l) return;
  const b = document.createElement('button');
  b.className = 'chip'; b.textContent = l.name;
  b.onclick = () => search(l.name);
  chips.appendChild(b);
});

const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const q = s => encodeURIComponent(s);
const target = s => `https://www.target.com/s?searchTerm=${s.replace(/ /g,'+')}`;
const costco = s => `https://www.costco.com/CatalogSearch?keyword=${s.replace(/ /g,'+')}`;
const microcenter = s => `https://www.microcenter.com/search/search_results.aspx?Ntt=${s.replace(/ /g,'+')}`;
const adorama = s => `https://www.adorama.com/l/?searchinfo=${s.replace(/ /g,'+')}`;
const samsclub = s => `https://www.samsclub.com/s/${q(s)}`;

// ---------- South Africa ----------
let REGION = 'us';

const takealot = s => `https://www.takealot.com/all?qsearch=${s.replace(/ /g,'+')}`;
const isApple = n => /macbook|apple/i.test(n);
const isGaming = n => /(ROG|MSI|Legion|Predator|Alienware|Nitro|TUF|Titan|Vector|Katana|Gigabyte|Zephyrus)/i.test(n);

// Rough USD -> ZAR retail estimate. SA prices include 15% VAT plus import duties and
// local margin, so real-world SA retail lands far above a raw currency conversion.
// Anchored on a known data point: a $1,099 MacBook Air retails ~R21,999-R24,999 in SA.
function zarBand(usdPrice) {
  const n = parseFloat(String(usdPrice).replace(/[^0-9.]/g, ''));
  if (!n || isNaN(n)) return null;
  const lo = Math.round((n * 20) / 500) * 500;
  const hi = Math.round((n * 23) / 500) * 500;
  return `≈R${lo.toLocaleString('en-ZA')}–R${hi.toLocaleString('en-ZA')}`;
}

function zaRetailers(name) {
  const list = [
    { name: 'Takealot', price: '→', note: "SA's biggest online store — delivers to every corner of South Africa", url: takealot(name) }
  ];
  if (isApple(name)) {
    list.push({ name: 'iStore', price: '→', note: 'Official Apple retailer in SA — widest Apple range, full local warranty', url: 'https://www.istore.co.za/' });
    list.push({ name: 'Evetech', price: '→', note: 'Apple Authorised Reseller — sealed stock, full SA manufacturer warranty', url: 'https://www.evetech.co.za/macbooks/l/3284' });
  } else if (isGaming(name)) {
    list.push({ name: 'Evetech', price: '→', note: "SA's largest gaming hardware retailer — price-match guarantee", url: 'https://www.evetech.co.za/laptop-specials-for-sale-south-africa' });
    list.push({ name: 'Wootware', price: '→', note: 'Enthusiast/gaming specialist, Somerset West — nationwide delivery', url: 'https://www.wootware.co.za/' });
    list.push({ name: 'Makro', price: '→', note: 'Warehouse pricing, 46 stores nationwide', url: 'https://www.makro.co.za/gaming/gaming-laptops/pr?sid=4rr%2Ctz1' });
  } else {
    list.push({ name: 'Incredible Connection', price: '→', note: '75 stores across SA — good for in-person support and returns', url: 'https://www.incredible.co.za/' });
    list.push({ name: 'Evetech', price: '→', note: 'Price-match guarantee, frequent clearance events', url: 'https://www.evetech.co.za/laptops.aspx' });
    list.push({ name: 'Makro', price: '→', note: 'Consistently among the cheapest SA retailers', url: 'https://www.makro.co.za/' });
  }
  return list;
}

function match(query) {
  const s = query.toLowerCase();
  let hit = null, score = 0;
  for (const l of DATA.laptops) {
    let sc = 0;
    const words = s.split(/\s+/);
    for (const k of l.keys) {
      if (k.includes(' ') && s.includes(k)) sc += 3 + (k.length >= 10 ? 1 : 0); // longer phrases are more specific
      else if (words.includes(k)) sc += (k.length >= 4 ? 2 : 1);     // whole word; bare numbers/short tokens count less
      else if (k.length >= 4 && s.includes(k)) sc += 1;              // substring only for longer keys
    }
    if (s.includes(l.name.toLowerCase().slice(0, 12))) sc += 1;
    if (sc > score) { score = sc; hit = l; }
  }
  return score > 1 ? hit : null;
}

function render(l, isKnown, query) {
  const box = document.getElementById('results');
  const za = REGION === 'za';

  // In SA mode, swap in local retailers rather than US ones (US stores rarely ship laptops to SA affordably).
  const retailers = za ? zaRetailers(l.name) : l.retailers;
  const usdBest = isKnown && l.retailers[l.bestIndex || 0] ? l.retailers[l.bestIndex || 0].price : null;
  const band = za && usdBest ? zarBand(usdBest) : null;

  const rows = retailers.map((r, i) => {
    const best = !za && isKnown && i === (l.bestIndex || 0);
    return `<div class="retailer${best ? ' best' : ''}">
      ${best ? '<span class="tag">LOWEST TRUE COST</span>' : ''}
      <div class="rname">${esc(r.name)}</div>
      <div class="price">${esc(r.price)}</div>
      <div class="rmeta">${esc(r.note || '')}</div>
      <a class="buy" href="${esc(r.url)}" target="_blank" rel="noopener">${(!za && isKnown) ? 'Buy' : 'Search'} at ${esc(r.name)} →</a>
    </div>`;
  }).join('');

  let flag;
  if (za) {
    flag = `<p class="modeflag warn">⚠ South Africa mode — I don't have verified rand prices yet, so these open live searches at SA retailers. ${band
      ? `Rough guide for this model: <b>${band}</b> (estimated from the US price plus typical SA import duty, margin, and 15% VAT — treat as a ballpark, not a quote).`
      : ''}</p>`;
  } else if (isKnown && l.verified === false) {
    flag = `<p class="modeflag warn">◐ In the database with a typical price for its tier — not yet individually price-verified. The bot re-checks these every 2 weeks; tap through for today's exact number.</p>`;
  } else if (isKnown) {
    flag = `<p class="modeflag">✓ Prices verified ${esc(DATA.asOf)} — tap through to confirm today's exact number.</p>`;
  } else {
    flag = `<p class="modeflag warn">✗ "${esc(query)}" isn't in the Pricewire database yet — it may be a new release, a regional model, or a config we haven't added. No made-up prices here; instead, below are the most common and trusted places to buy laptops${za ? ' in South Africa' : ' in the US'}, each opening a live search for this exact model. You can also ask your Claude bot to add it to the watchlist.</p>`;
  }

  const foot = za
    ? `<p class="foot">SA tips: prices include 15% VAT and swing with the rand. Comparing retailers typically saves R500–R2,000, Black Friday (November) brings the deepest cuts, and buying the previous generation right after a new chip launches is the biggest single saving.</p>`
    : `<p class="foot">Prices move fast — always confirm on the retailer's page before checkout.</p>`;

  box.innerHTML = `
    <div class="rhead"><h2>${esc(l.name)}</h2>${l.specs ? `<p>${esc(l.specs)}</p>` : ''}</div>
    ${(l.why && !za) ? `<div class="why"><b>Best pick:</b> ${esc(l.why)}</div>` : ''}
    ${flag}
    ${rows}
    ${foot}`;
  box.style.display = 'block';
  box.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function search(qs) {
  const term = (qs || document.getElementById('q').value).trim();
  if (!term) return;
  document.getElementById('q').value = term;
  const hit = match(term);
  if (hit) return render(hit, true, term);
  const unknown = { name: term, specs: '', why: '', retailers: [] };
  if (REGION === 'za') {
    unknown.retailers = zaRetailers(term + ' laptop');
  } else {
    unknown.retailers = [
      { name: 'Amazon', price: '→', note: 'Ships nationwide across the US', url: `https://www.amazon.com/s?k=${q(term + ' laptop')}` },
      { name: 'Best Buy', price: '→', note: 'Ships nationwide across the US', url: `https://www.bestbuy.com/site/searchpage.jsp?st=${q(term + ' laptop')}` },
      { name: 'B&H', price: '→', note: 'Ships nationwide across the US', url: `https://www.bhphotovideo.com/c/search?q=${q(term + ' laptop')}` },
      { name: 'Newegg', price: '→', note: 'Ships nationwide across the US', url: `https://www.newegg.com/p/pl?d=${q(term + ' laptop')}` },
      { name: 'Target', price: '→', note: 'Ships nationwide across the US', url: target(term + ' laptop') },
      { name: 'Micro Center', price: '→', note: 'Nationwide US store locations plus online shipping', url: microcenter(term + ' laptop') },
      { name: 'Costco', price: '→', note: 'Ships nationwide across the US — membership required', url: costco(term + ' laptop') }
    ];
  }
  render(unknown, false, term);
}

let lastQuery = '';
const origSearch = search;
search = function(qs) { lastQuery = (qs || document.getElementById('q').value).trim(); return origSearch(qs); };

function setRegion(r) {
  REGION = r;
  document.getElementById('btn-us').classList.toggle('active', r === 'us');
  document.getElementById('btn-za').classList.toggle('active', r === 'za');
  document.getElementById('sub-note').textContent = r === 'za'
    ? "South Africa mode — searches Takealot, Evetech, Incredible Connection, Makro, Wootware and iStore."
    : "Prices re-verified every 2 weeks across Amazon, Best Buy, B&H, Newegg, Costco and more.";
  if (lastQuery) origSearch(lastQuery); // re-render current result in the new region
}
document.getElementById('btn-us').onclick = () => setRegion('us');
document.getElementById('btn-za').onclick = () => setRegion('za');

document.getElementById('goBtn').onclick = () => search();
  document.getElementById('resetBtn').onclick = () => {
  document.getElementById('q').value = '';
  document.getElementById('results').innerHTML = '';
  chips.innerHTML = '';
  DATA.laptops.slice().sort(() => Math.random() - 0.5).slice(0, 4).forEach(l => {
    const b = document.createElement('button');
    b.className = 'chip'; b.textContent = l.name;
    b.onclick = () => search(l.name);
    chips.appendChild(b);
  });
  document.getElementById('q').focus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

document.getElementById('q').addEventListener('keydown', e => { if (e.key === 'Enter') search(); });
</script>
</body>
